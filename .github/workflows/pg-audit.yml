name: PostgreSQL Security Audit

on:
  push:
    branches: [main, master, develop]
  pull_request:
    branches: [main, master]
  workflow_dispatch:
    inputs:
      enforce_gate:
        description: "Fail the workflow when HIGH/CRITICAL findings are detected"
        required: false
        default: false
        type: boolean

jobs:
  pg-security-audit:
    name: Run PostgreSQL security audit
    runs-on: ubuntu-latest
    permissions:
      contents: read
      security-events: write

    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_PASSWORD: ci_audit_password
          POSTGRES_DB: testdb
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U postgres"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Run pg-stig-audit
        id: audit
        env:
          PGPASSWORD: ci_audit_password
        run: |
          python3 audit.py \
            --mode direct \
            --host localhost \
            --port 5432 \
            --user postgres \
            --database testdb \
            --sarif pg-audit-results.sarif.json \
            --json pg-audit-results.json \
            --wiz pg-audit-wiz.json \
            --fail-on high
        continue-on-error: true

      - name: Audit summary
        if: always()
        run: |
          if [ "${{ steps.audit.outcome }}" = "failure" ]; then
            echo "pg-stig-audit detected HIGH or CRITICAL findings in the sample CI target."
            echo "This workflow records findings and uploads artifacts by default; it does not fail the run unless strict gating is explicitly requested."
          else
            echo "pg-stig-audit completed without triggering the configured fail-on threshold."
          fi

      - name: Upload SARIF
        if: always()
        uses: github/codeql-action/upload-sarif@v3
        with:
          sarif_file: pg-audit-results.sarif.json
          category: pg-stig-audit

      - name: Upload audit artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: pg-audit-results-${{ github.run_number }}
          path: |
            pg-audit-results.sarif.json
            pg-audit-results.json
            pg-audit-wiz.json
          retention-days: 30

      - name: Enforce pipeline gate
        if: steps.audit.outcome == 'failure' && github.event_name == 'workflow_dispatch' && inputs.enforce_gate
        run: |
          echo "pg-stig-audit found HIGH or CRITICAL findings. Strict gate was explicitly requested."
          exit 1
